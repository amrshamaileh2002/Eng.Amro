<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maryam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background: linear-gradient(135deg,#0a0e27 0%,#1a1a3e 50%,#0d0d1f 100%);
color:#e0e0e0;
font-family:'Poppins',sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
width:100%;
}

/* Rain */

#rain-container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.drop{
position:absolute;
background:rgba(255,255,255,0.1);
width:1px;
height:50px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

/* Glass Card */

.glass-card{
position:relative;
z-index:10;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:50px 40px;
width:90%;
max-width:550px;
text-align:center;
box-shadow:0 8px 32px 0 rgba(0,0,0,0.37);
animation:fadeIn 2s ease-out forwards;
transition:opacity 2s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Rose */

.symbol{
font-size:3.5rem;
margin-bottom:25px;
display:inline-block;
animation:pulse 4s ease-in-out infinite;
filter:drop-shadow(0 0 10px rgba(255,255,255,0.3));
}

@keyframes pulse{
0%,100%{
transform:scale(1);
opacity:0.6;
}
50%{
transform:scale(1.08);
opacity:0.3;
}
}

h1{
font-weight:300;
letter-spacing:5px;
margin-bottom:30px;
color:#fff;
font-size:2.2rem;
text-transform:uppercase;
}

/* Message */

#message-text{
font-family:'Dancing Script',cursive;
font-size:1.3rem;
line-height:1.8;
min-height:160px;
color:#d1d1d1;
text-align:center;
margin-bottom:35px;
}

/* Button */

.btn-close{
background:transparent;
border:1px solid rgba(255,255,255,0.3);
color:#aaa;
padding:12px 30px;
border-radius:30px;
cursor:pointer;
font-size:0.95rem;
font-family:'Poppins',sans-serif;
transition:all 0.4s ease;
opacity:0;
visibility:hidden;
}

.btn-show{
animation:fadeIn 1.2s forwards;
visibility:visible;
}

.btn-close:hover{
background:rgba(255,255,255,0.1);
color:#fff;
border-color:#fff;
transform:scale(1.05);
}

/* Final Screen */

#final-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:100;
opacity:0;
pointer-events:none;
transition:opacity 3s ease-in-out;
}

.final-text{
font-family:'Dancing Script',cursive;
font-size:1.6rem;
color:#555;
text-align:center;
}

/* Bottom note */

.bottom-note{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-family:'Dancing Script',cursive;
font-size:1.1rem;
color:rgba(255,255,255,0.4);
letter-spacing:1px;
z-index:5;
}

/* fade out */

@keyframes fadeOut{
to{
opacity:0;
transform:translateY(-20px);
}
}

</style>
</head>

<body>

<div id="rain-container"></div>

<div class="glass-card" id="main-card">

<div class="symbol">🥀</div>

<h1>MARYAM</h1>

<div id="message-text"></div>

<button class="btn-close" id="close-btn" onclick="closeExperience()">Close this.</button>

</div>

<div id="final-screen">
<div class="final-text">Take care of yourself, wherever you are.</div>
</div>

<!-- Bottom text -->
<div class="bottom-note">
You were so rare and Miso sends his bears.
</div>

<script>

const message="Sometimes, the hardest part of moving forward is letting go of the words we never said. I wanted to thank you for the time we shared, for the quiet moments, and the lessons learned. We cross paths for reasons we don't always understand, and we part ways when the journey demands a different direction. I carry no ill will, only gratitude for the person you are. May your path be bright, even where mine cannot follow.";

const textContainer=document.getElementById('message-text');
const closeBtn=document.getElementById('close-btn');

let i=0;

function typeWriter(){

if(i<message.length){

textContainer.innerHTML+=message.charAt(i);

i++;

let speed=50;

if(message.charAt(i-1)==='.'||message.charAt(i-1)===','){
speed=600;
}

setTimeout(typeWriter,speed);

}else{

closeBtn.classList.add('btn-show');

}

}

function createRain(){

const rainContainer=document.getElementById('rain-container');

for(let i=0;i<100;i++){

const drop=document.createElement('div');

drop.className='drop';

drop.style.left=Math.random()*100+'vw';

drop.style.animationDuration=(Math.random()*2+1)+'s';

drop.style.animationDelay=Math.random()*2+'s';

drop.style.opacity=Math.random()*0.5+0.2;

rainContainer.appendChild(drop);

}

}

function closeExperience(){

document.getElementById('main-card').style.opacity='0';

setTimeout(()=>{

document.getElementById('final-screen').style.opacity='1';

document.getElementById('main-card').style.display='none';

},2000);

setTimeout(()=>{

document.querySelector('.final-text').style.animation='fadeOut 3s forwards';

},4000);

}

window.addEventListener('load',()=>{

createRain();

setTimeout(typeWriter,1500);

});

</script>

</body>
</html>
