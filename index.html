<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye, Maryam.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- BASE STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #0f172a, #020617); 
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
            color: #94a3b8;
            transition: background 4s ease;
        }

        /* --- RAIN EFFECT --- */
        .rain-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            bottom: 100%;
            width: 1px;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(120vh); }
        }

        /* --- SYMBOLIC VISUAL (Broken Heart/Withered Flower) --- */
        .visual-area {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .symbol {
            font-size: 60px;
            animation: pulse 5s ease-in-out infinite;
            filter: grayscale(100%) opacity(0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.6; }
        }

        /* --- DARK GLASS CARD --- */
        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 90%;
            width: 550px; 
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: opacity 3s ease, transform 3s ease;
        }

        h1 {
            color: #f8fafc;
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .message-text {
            font-family: 'Indie Flower', cursive;
            color: #8fa3b8;
            font-size: 1.15rem;
            margin-bottom: 40px;
            line-height: 1.7;
            text-align: left; 
            white-space: pre-wrap; 
            min-height: 250px; 
        }

        /* --- MINIMALIST BUTTON --- */
        button {
            padding: 12px 40px;
            font-size: 0.85rem;
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #475569;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.6s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            
            /* Hidden initially, revealed by JS */
            opacity: 0;
            pointer-events: none; 
        }

        button:hover {
            border-color: #94a3b8;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        /* --- STATES --- */
        .fade-out {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
        }

        .final-message {
            position: absolute;
            opacity: 0;
            transition: opacity 5s ease 1s;
            color: #334155;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            bottom: 10%;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <div class="rain-container" id="rainBox"></div>

    <div class="card" id="mainCard">
        <div class="visual-area">
            <div class="symbol">🥀</div>
        </div>
        
        <h1>Maryam</h1>
        
        <div class="message-text" id="typingText"></div>

        <button id="acceptBtn">Close this.</button>
    </div>

    <div class="final-message" id="finalMsg">
        Take care of yourself, wherever you are.
    </div>

    <script>
        // --- TEXT CONFIGURATION ---
        const textToType = "The pain of walking away from you isn’t sharp—it’s slow. It’s suffocating. I felt guilt. Rage. Doubt. I missed you terribly. I wanted you to call and say, “You were right. Let’s do it differently. I love you.” But that call never came.\n\nInstead, you became distant. Dismissive. Angry, even. I think I threatened something you didn’t want to confront—your control. Your ability to hold all the power. I left because I had to. I miss you, and I didn't want this to happen, Maryam, but it had to be this way.\n\nAnd still, even now, I sometimes ache for the imagined version of you. The woman I thought you could be. The future I had painted in my mind. But that wasn’t real.";
        
        const typingElement = document.getElementById('typingText');
        const rainBox = document.getElementById('rainBox');
        const acceptBtn = document.getElementById('acceptBtn');
        const mainCard = document.getElementById('mainCard');
        const finalMsg = document.getElementById('finalMsg');

        // 1. Typing Effect
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < textToType.length) {
                typingElement.innerHTML += textToType.charAt(charIndex);
                charIndex++;
                
                // Slight pause on punctuation for emotional weight, faster for normal letters
                let speed = 35; 
                let char = textToType.charAt(charIndex - 1);
                if (char === '.' || char === '—' || char === '\n') speed = 300;
                
                setTimeout(typeWriter, speed); 
            } else {
                // Fade the button in gracefully after the text finishes
                setTimeout(() => {
                    acceptBtn.style.opacity = 1;
                    acceptBtn.style.pointerEvents = "auto";
                }, 1500);
            }
        }
        
        // Start typing after a short delay
        setTimeout(typeWriter, 1200);

        // 2. Persistent Rain Effect
        function createRain() {
            const dropCount = 80; // Heavier rain
            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = Math.random() * 0.8 + 0.4 + 's';
                drop.style.opacity = Math.random() * 0.25;
                rainBox.appendChild(drop);
            }
        }
        createRain();

        // 3. Acceptance Action
        acceptBtn.addEventListener('click', function() {
            // Card disappears into the darkness
            mainCard.classList.add('fade-out');
            
            // Fades background to pure black
            document.body.style.background = "#000000";
            
            // Shows final message after delay
            setTimeout(() => {
                finalMsg.style.opacity = 1;
            }, 500);
            
            // Finally, fade everything to complete blackness
            setTimeout(() => {
                finalMsg.style.opacity = 0;
            }, 6000);
        });
    </script>
</body>
</html>
