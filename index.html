<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye, Maryam.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- BASE STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Deep, dark void colors */
            background: linear-gradient(to bottom, #0f172a, #020617); 
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
            color: #94a3b8;
            transition: background 4s ease;
        }

        /* --- RAIN EFFECT --- */
        .rain-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            bottom: 100%;
            width: 1px;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(120vh); }
        }

        /* --- SYMBOLIC VISUAL (Broken Heart/Withered Flower) --- */
        .visual-area {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .symbol {
            font-size: 70px;
            animation: pulse 5s ease-in-out infinite;
            filter: grayscale(100%) opacity(0.5);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.95); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.6; }
        }

        /* --- DARK GLASS CARD --- */
        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 90%;
            width: 440px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: opacity 3s ease, transform 3s ease;
        }

        h1 {
            color: #f8fafc;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .message-text {
            font-family: 'Indie Flower', cursive;
            color: #64748b;
            font-size: 1.25rem;
            margin-bottom: 40px;
            line-height: 1.6;
            min-height: 4.5em; /* Prevents card jumping during typing */
        }

        /* --- MINIMALIST BUTTON --- */
        button {
            padding: 12px 40px;
            font-size: 0.85rem;
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #475569;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.6s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        button:hover {
            border-color: #94a3b8;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.01);
        }

        /* --- STATES --- */
        .fade-out {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .final-message {
            position: absolute;
            opacity: 0;
            transition: opacity 5s ease 1s;
            color: #334155;
            font-size: 0.8rem;
            text-align: center;
            width: 100%;
            bottom: 10%;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="rain-container" id="rainBox"></div>

    <div class="card" id="mainCard">
        <div class="visual-area">
            <div class="symbol">🥀</div>
        </div>
        
        <h1>Maryam</h1>
        <div class="message-text" id="typingText"></div>

        <button id="acceptBtn">I accept your choice.</button>
    </div>

    <div class="final-message" id="finalMsg">
        Take care of yourself.
    </div>

    <script>
        // --- CONFIGURATION ---
        const textToType = "I understand now. You chose your own life, and I have to respect that. Even if it means walking away.";
        
        const typingElement = document.getElementById('typingText');
        const rainBox = document.getElementById('rainBox');
        const acceptBtn = document.getElementById('acceptBtn');
        const mainCard = document.getElementById('mainCard');
        const finalMsg = document.getElementById('finalMsg');

        // 1. Typing Effect (Slow & Heavy)
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < textToType.length) {
                typingElement.innerHTML += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 75); 
            }
        }
        setTimeout(typeWriter, 1200);

        // 2. Persistent Rain Effect
        function createRain() {
            const dropCount = 70;
            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = Math.random() * 0.8 + 0.5 + 's';
                drop.style.opacity = Math.random() * 0.2;
                rainBox.appendChild(drop);
            }
        }
        createRain();

        // 3. Acceptance Action
        acceptBtn.addEventListener('click', function() {
            // Card disappears into the darkness
            mainCard.classList.add('fade-out');
            
            // Fades background to pure black
            document.body.style.background = "#000000";
            
            // Shows final message after delay
            setTimeout(() => {
                finalMsg.style.opacity = 1;
            }, 500);
        });
    </script>
</body>
</html>
